name: Frontend CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main, master, feature/** ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    env:
      VITE_ROUTER_MODE: hash
      VITE_SUPABASE_PROJECT_ID: ${{ vars.VITE_SUPABASE_PROJECT_ID }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      VITE_SOLANA_CLUSTER: ${{ vars.VITE_SOLANA_CLUSTER }}
      VITE_SOLANA_RPC_URL: ${{ vars.VITE_SOLANA_RPC_URL }}
      VITE_SOLANA_TOKEN_MINT: ${{ vars.VITE_SOLANA_TOKEN_MINT }}
      VITE_ADMIN_WALLETS: ${{ vars.VITE_ADMIN_WALLETS }}
      VITE_WALLET_BRIDGE_ALLOWED_CALLBACK_PREFIXES: ${{ vars.VITE_WALLET_BRIDGE_ALLOWED_CALLBACK_PREFIXES }}
      VITE_TELEMETRY_ENDPOINT: ${{ vars.VITE_TELEMETRY_ENDPOINT }}

    steps:
    # Kaynak kodu al ve lock dosyasi ile deterministik kurulum yap.
    - uses: actions/checkout@v6
    
    - name: Use Node.js 22
      uses: actions/setup-node@v6
      with:
        node-version: 22.x
        cache: 'npm'
        cache-dependency-path: package-lock.json

    - name: Install dependencies
      run: npm ci --no-audit --no-fund

    - name: Validate
      run: |
        npm run lint
        npm run build
