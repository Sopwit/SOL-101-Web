[toolchain]

[features]
# Anchor komutlari icin temel davranis ayarlari.
resolution = true
skip-lint = false

[programs.devnet]
# Devnet program adresi frontend/on-chain istemci ile uyumlu tutulmalidir.
duan_shop = "3bssRuvTNFzsGbawzSWtFgycQBXvL1vWXnq44XUSu5y3"

[registry]
url = "https://api.apr.dev"

[provider]
# Varsayilan local gelistirme profili.
